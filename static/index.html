<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Citas AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="py-5">

<div class="container">
    <div class="row g-4">
        <div class="col-md-8">
            <div class="card p-4">
                <h3 class="mb-4">📅 Panel de Control de Citas</h3>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Folio</th>
                                <th>Paciente</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-citas"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 d-flex flex-column">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">🤖 Asistente Médico</h5>
                </div>
                <div id="chat-box" class="chat-container d-flex flex-column flex-grow-1">
                    <div class="message bot-msg">¡Hola! Soy tu asistente. ¿Cómo puedo ayudarte?</div>
                </div>
                <div class="p-3">
                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control" placeholder="Escribe un mensaje...">
                        <button class="btn btn-primary" onclick="enviarMensaje()">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
